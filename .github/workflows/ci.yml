name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install rdkit scikit-learn pandas numpy lightgbm pytest flake8

      - name: Lint
        run: flake8 app.py fetch_data.py run_notebook.py --max-line-length 120

      - name: Unit tests
        run: pytest tests/ -v
